<div class="label">Decision Log</div>
<div class="mt-3 overflow-x-auto">
  <table class="table-compact">
    <thead><tr><th>Time</th><th>Symbol</th><th>Action</th><th>Reason</th></tr></thead>
    <tbody>
      {% for decision in decisions %}
        <tr><td>{{ decision.timestamp }}</td><td>{{ decision.symbol }}</td><td>{{ decision.action }}</td><td>{{ decision.reason }}</td></tr>
      {% else %}
        <tr><td colspan="4" class="text-zinc-500">No decisions recorded yet. Rejected and no-trade decisions will appear here once the decision runner is enabled.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
