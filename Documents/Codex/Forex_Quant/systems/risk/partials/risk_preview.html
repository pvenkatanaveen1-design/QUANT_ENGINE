<div id="risk-preview" class="rounded border border-zinc-200 bg-zinc-50 p-3">
  <div class="label">Position Sizing Preview</div>
  <div class="mt-3 grid gap-3 md:grid-cols-3">
    <div><div class="metric-label">Final Risk</div><div class="metric-value">{{ preview.final_risk_percent }}%</div></div>
    <div><div class="metric-label">Risk Amount</div><div class="metric-value">{{ preview.risk_amount }}</div></div>
    <div><div class="metric-label">Lot Size</div><div class="metric-value">{{ preview.lot_size }}</div></div>
  </div>
  <ul class="mt-3 text-sm text-zinc-600">
    {% for reason in preview.reasons %}
      <li>{{ reason }}</li>
    {% endfor %}
  </ul>
</div>
