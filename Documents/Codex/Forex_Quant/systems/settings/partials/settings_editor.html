<div id="settings-editor">
  <div class="label">{{ selected.system }} Config</div>
  <div class="mt-2 text-sm text-zinc-500">{{ selected.path }}</div>
  <form class="mt-3 space-y-3" hx-post="/api/settings/{{ selected.system }}/preview" hx-target="#settings-preview" hx-swap="textContent">
    <textarea class="input h-[460px] w-full font-mono text-xs" name="content">{{ selected.content }}</textarea>
    <div class="flex flex-wrap gap-2">
      <button class="button" type="submit">Preview YAML</button>
      <button
        class="button bg-zinc-700 hover:bg-zinc-800"
        type="submit"
        hx-post="/api/settings/{{ selected.system }}/save"
        hx-confirm="Save this config with backup? Dangerous live flags are still blocked.">
        Save With Backup
      </button>
    </div>
  </form>
  <pre id="settings-preview" class="mt-3 whitespace-pre-wrap rounded border border-zinc-200 bg-zinc-50 p-3 text-xs text-zinc-700"></pre>
</div>
