<div id="regime-playbook">
  <div class="label">Current Regime Playbook: {{ selected.regime_id }}</div>
  <div class="mt-3 grid gap-3 md:grid-cols-4">
    {% for item in selected.candidates %}
      <section class="rounded border border-zinc-200 bg-zinc-50 p-3">
        <div class="metric-label">{{ item.slot }}</div>
        <div class="mt-2 font-semibold">{{ item.name }}</div>
        <div class="mt-3 flex flex-wrap gap-2">
          <span class="status-pill status-gray">{{ item.status }}</span>
          <span class="status-pill {% if item.enabled %}status-green{% else %}status-gray{% endif %}">enabled {{ item.enabled }}</span>
        </div>
      </section>
    {% else %}
      <div class="text-sm text-zinc-500">No playbook found for this regime.</div>
    {% endfor %}
  </div>
</div>
