<div class="label">Selected Regime: {{ selected.regime_id }}</div>
<div class="mt-2 text-sm text-zinc-400">{{ selected.reasons | join(" ") }}</div>
<div class="mt-3 overflow-x-auto">
  <table class="table-compact">
    <thead><tr><th>Slot</th><th>Name</th><th>Family</th><th>Status</th><th>Enabled</th><th>Live</th></tr></thead>
    <tbody>
      {% for item in selected.candidates %}
        <tr><td>{{ item.slot }}</td><td>{{ item.name }}</td><td>{{ item.family }}</td><td>{{ item.status }}</td><td>{{ item.enabled }}</td><td>{{ item.live_allowed }}</td></tr>
      {% else %}
        <tr><td colspan="6" class="text-zinc-400">No candidates.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
